name: Android Build
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔄 Sync Expo dependencies
        run: npx expo install --fix -- --yes

      - name: 🛠 Clean & Prebuild
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: ⚙️ Configure Gradle Memory & Host (Radioactive Fix)
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "android.enablePngCrunch=false" >> android/gradle.properties
          
      - name: 🧪 Inject Gradle Suppressions
        run: |
          python -c '
          import os, re
          path = "android/build.gradle"
          if os.path.exists(path):
              with open(path, "r") as f: content = f.read()
              content = re.sub(r"kotlinVersion\s*=\s*.*", "kotlinVersion = \"1.9.24\"", content)
              injection = "\nallprojects {\n    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {\n        kotlinOptions {\n            freeCompilerArgs += [\"-P\", \"plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true\"]\n        }\n    }\n}\n"
              with open(path, "w") as f: f.write(content + injection)
              print("Gradle Radioactive patch applied.")
          '

      - name: 🏗️ Build Android Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: 🚀 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
